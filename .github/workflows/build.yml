name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.0'

      - name: Run go fmt
        run: go fmt ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: |
          mkdir -p output
          go build -o output/anytls ./cmd/...

      - name: Run tests
        run: go test -race ./...

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anytls-${{ matrix.os }}
          path: output/
